changelog:
  exclude:
    labels:
      - duplicate
      - invalid
      - wontfix
  categories:
    - title: 🚀 Features
      labels:
        - feature
    - title: 🐛 Bug Fixes
      labels:
        - bugfix
    - title: 🧹 Maintenance
      labels:
        - chore
    - title: Other Changes
      labels:
        - "*"
