name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore GamePartyHud.sln

      - name: Build
        run: dotnet build GamePartyHud.sln -c Release --no-restore

      - name: Test
        run: dotnet test GamePartyHud.sln -c Release --no-build --verbosity normal

      - name: Verify relay URL secret is configured
        shell: pwsh
        env:
          GPH_RELAY_URL: ${{ secrets.GPH_RELAY_URL }}
          GPH_RELAY_FALLBACK_URL: ${{ secrets.GPH_RELAY_FALLBACK_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GPH_RELAY_URL)) {
            Write-Error "GPH_RELAY_URL secret is not configured. Aborting release to avoid shipping the placeholder relay URL."
            exit 1
          }
          Write-Host "GPH_RELAY_URL is set; proceeding with release."
          # GPH_RELAY_FALLBACK_URL is optional — when unset, the binary ships
          # with single-URL behaviour (no fallback). When set, the URL is
          # baked in as the secondary endpoint clients try if the primary
          # fails to connect within the client-side timeout. Used to route
          # around ISPs that block the Cloudflare CIDR ranges where the
          # primary Worker lives.
          if ([string]::IsNullOrWhiteSpace($env:GPH_RELAY_FALLBACK_URL)) {
            Write-Host "GPH_RELAY_FALLBACK_URL is unset; release will ship without a fallback endpoint."
          } else {
            Write-Host "GPH_RELAY_FALLBACK_URL is set; release will include fallback endpoint."
          }

      - name: Publish
        env:
          GPH_RELAY_URL: ${{ secrets.GPH_RELAY_URL }}
          GPH_RELAY_FALLBACK_URL: ${{ secrets.GPH_RELAY_FALLBACK_URL }}
          GPH_DISCORD_WEBHOOK_URL: ${{ secrets.GPH_DISCORD_WEBHOOK_URL }}
        run: >
          dotnet publish src/GamePartyHud/GamePartyHud.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          "-p:RelayUrl=${env:GPH_RELAY_URL}"
          "-p:RelayFallbackUrl=${env:GPH_RELAY_FALLBACK_URL}"
          "-p:DiscordWebhookUrl=${env:GPH_DISCORD_WEBHOOK_URL}"

      - name: Zip release
        shell: pwsh
        run: |
          $publishDir = "src/GamePartyHud/bin/Release/net8.0-windows10.0.19041.0/win-x64/publish"
          Compress-Archive -Path "$publishDir/GamePartyHud.exe" -DestinationPath "GamePartyHud-${{ github.ref_name }}-win-x64.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: GamePartyHud-${{ github.ref_name }}-win-x64.zip

      - name: Announce release on Discord
        continue-on-error: true
        shell: pwsh
        env:
          GPH_DISCORD_WEBHOOK_URL: ${{ secrets.GPH_DISCORD_WEBHOOK_URL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:GPH_DISCORD_WEBHOOK_URL)) {
              Write-Host "GPH_DISCORD_WEBHOOK_URL not configured; skipping Discord announcement."
              exit 0
          }

          # gh release view runs against the just-created release; GitHub
          # guarantees the prior action's call has committed the release
          # before returning, so there's no race here.
          $release = gh release view $env:TAG_NAME --json name,body,url,isPrerelease |
                     ConvertFrom-Json

          # Discord embed description has a 4096-char limit. Truncate with
          # a "see full release" footer link so long release notes never
          # break the request.
          $desc = $release.body
          if ($desc.Length -gt 3900) {
              $desc = $desc.Substring(0, 3900) + "`n`n…notes truncated, [see full release]($($release.url))"
          }

          # Decimal Discord color values.
          # Stable  = green 0x2ECC71 = 3066993
          # Prerel. = amber 0xFFA500 = 16753920
          $color  = if ($release.isPrerelease) { 16753920 } else { 3066993 }
          $footer = if ($release.isPrerelease) { "Prerelease" } else { "Release" }

          $payload = @{
              embeds = @(
                  @{
                      title       = $release.name
                      url         = $release.url
                      description = $desc
                      color       = $color
                      footer      = @{ text = $footer }
                  }
              )
              # Defensive: release notes mentioning @here / @everyone
              # would ping the channel otherwise. Same posture as
              # src/GamePartyHud/Network/DiscordNotifier.cs.
              allowed_mentions = @{ parse = @() }
          }
          $body = $payload | ConvertTo-Json -Depth 6 -Compress

          try {
              Invoke-RestMethod -Uri $env:GPH_DISCORD_WEBHOOK_URL `
                                -Method Post `
                                -ContentType 'application/json' `
                                -Body $body | Out-Null
              Write-Host "Discord release notification sent for $($release.name)."
          }
          catch {
              # continue-on-error means this Write-Error won't fail the
              # whole job, but the message + Discord's response body land
              # in the workflow log for diagnosis.
              Write-Error "Discord release notification failed: $($_.Exception.Message)"
              if ($_.ErrorDetails) { Write-Error $_.ErrorDetails.Message }
          }
